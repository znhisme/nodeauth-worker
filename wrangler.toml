name = "nodeauth-worker"
main = "backend/dist/worker/worker.js" 
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]

[build]
command = "node scripts/inject_vars.js --platform=cloudflare"

[assets]
binding = "ASSETS"
directory = "frontend/dist" 
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/share/*", "/assets/*", "/sw.js", "/manifest.webmanifest"]

[[d1_databases]]
binding = "DB"
database_name = "nodeauth-db"

[triggers]
crons = ["0 2 * * *"]

[observability]
enabled = false

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
